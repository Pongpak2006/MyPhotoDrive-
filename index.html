<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Photo Vault</title>
    
    <link rel="icon" type="image/png" href="https://i.postimg.cc/jqMXsk40/C4925ED8-7DE0-4FA1-BC0D-9829AE4BA690.png">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/jqMXsk40/C4925ED8-7DE0-4FA1-BC0D-9829AE4BA690.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="My Vault">
    
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg-color: #F8F9FA; 
            --text-main: #2C3E50; 
            --text-muted: #7F8C8D; 
            --card-bg: #FFFFFF; 
        }
        
        html, body { margin: 0; padding: 0; height: 100%; overscroll-behavior: none; font-family: 'Kanit', sans-serif; background-color: var(--bg-color); color: var(--text-main); -webkit-tap-highlight-color: transparent; }
        
        .logo-img { width: 80px; height: 80px; object-fit: cover; border-radius: 50%; margin-bottom: 15px; box-shadow: 0 8px 24px rgba(0,0,0,0.06); }
        
        #login-section { position: fixed; top: 0; left: 0; width: 100%; height: 100dvh; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; background-color: var(--bg-color); }
        .login-box { background: var(--card-bg); padding: 45px 35px; border-radius: 28px; box-shadow: 0 15px 35px rgba(0,0,0,0.04); text-align: center; width: 85%; max-width: 340px; position: relative; }
        .login-box h2 { margin: 0 0 5px; font-weight: 600; letter-spacing: 2px; font-size: 24px; }
        .login-box p { color: var(--text-muted); font-size: 14px; margin-bottom: 35px; font-weight: 400; }
        
        input[type="password"], input[type="text"] { width: 100%; padding: 16px; border: 1.5px solid #EAEAEA; border-radius: 14px; font-family: 'Kanit'; font-size: 16px; margin-bottom: 20px; box-sizing: border-box; outline: none; text-align: center; letter-spacing: 2px; font-weight: 500; }
        input:focus { border-color: var(--text-main); }
        button.action-btn { background: var(--text-main); color: #FFF; border: none; padding: 16px; width: 100%; border-radius: 14px; font-family: 'Kanit'; font-size: 15px; cursor: pointer; transition: all 0.3s ease; letter-spacing: 1.5px; font-weight: 500; }
        button.action-btn:hover { background: #1A252F; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(44, 62, 80, 0.2); }
        
        .settings-btn { position: absolute; top: 20px; right: 20px; background: none; border: none; font-size: 20px; cursor: pointer; opacity: 0.5; transition: 0.3s; }
        .settings-btn:hover { opacity: 1; }

        #gallery-section { display: none; width: 100%; max-width: 1100px; margin: 0 auto; padding: 60px 30px; box-sizing: border-box; }
        header { display: flex; flex-direction: column; align-items: center; margin-bottom: 45px; }
        h1 { margin: 0 0 15px; font-weight: 500; font-size: 26px; letter-spacing: 3px; }
        
        /* สไตล์ปุ่มกดอัปเดตรูป และ ปุ่มออกจากระบบ */
        .header-actions { display: flex; gap: 10px; margin-bottom: 25px; }
        .sync-btn, .logout-btn { background: transparent; border: 1px solid #EAEAEA; color: var(--text-muted); padding: 6px 18px; border-radius: 20px; font-family: 'Kanit'; font-size: 13px; cursor: pointer; transition: all 0.3s ease; font-weight: 400; }
        
        .sync-btn:hover { border-color: #3498DB; color: #3498DB; background: rgba(52, 152, 219, 0.03); }
        .logout-btn:hover { border-color: #E74C3C; color: #E74C3C; background: rgba(231, 76, 60, 0.03); }

        .tabs { display: flex; gap: 15px; background: #FFF; padding: 8px; border-radius: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); overflow-x: auto; max-width: 100%; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab-btn { background: transparent; color: var(--text-muted); padding: 10px 24px; border-radius: 20px; font-size: 14px; border: none; cursor: pointer; font-family: 'Kanit'; white-space: nowrap; font-weight: 500; }
        .tab-btn.active { background: var(--text-main); color: #FFF; font-weight: 600; }

        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .img-card { background: #EEE; height: 280px; border-radius: 20px; overflow: hidden; position: relative; box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: opacity 0.3s ease; cursor: zoom-in; }
        .img-card img { width: 100%; height: 100%; object-fit: cover; }
        
        .tag { position: absolute; bottom: 15px; left: 15px; background: rgba(255, 255, 255, 0.95); padding: 6px 14px; border-radius: 12px; font-size: 12px; font-weight: 600; box-shadow: 0 4px 10px rgba(0,0,0,0.08); color: var(--text-main); pointer-events: none; }
        .sub-tag { position: absolute; top: 15px; left: 15px; background: rgba(44, 62, 80, 0.9); padding: 6px 14px; border-radius: 12px; font-size: 12px; font-weight: 500; color: #FFF; backdrop-filter: blur(5px); pointer-events: none; }
        .delete-btn { position: absolute; bottom: 15px; right: 15px; background: rgba(255, 255, 255, 0.9); border: none; width: 36px; height: 36px; border-radius: 50%; font-size: 16px; cursor: pointer; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: 0.3s; z-index: 2; }
        .delete-btn:hover { background: #E74C3C; color: #FFF; transform: scale(1.1); }

        #loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.9); z-index: 9999; flex-direction: column; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--text-main); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; justify-content: center; align-items: center; flex-direction: column; }
        #lightbox img { max-width: 90%; max-height: 75vh; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); object-fit: contain; }
        .lightbox-controls { margin-top: 25px; display: flex; gap: 15px; }
        .btn-close { background: #333; color: white; padding: 10px 20px; border-radius: 20px; border: none; font-family: 'Kanit'; cursor: pointer; font-weight: 500; }
        .btn-download { background: #FFF; color: #000; padding: 10px 20px; border-radius: 20px; text-decoration: none; font-family: 'Kanit'; font-weight: 600; }

        #password-modal { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--card-bg); z-index: 20; border-radius: 28px; padding: 45px 35px; box-sizing: border-box; flex-direction: column; justify-content: center; align-items: center; }

        @media screen and (max-width: 768px) {
            .login-box { width: 90%; padding: 35px 25px; }
            #gallery-section { padding: 30px 15px; }
            .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(100%, 1fr)); gap: 20px; }
            .img-card { height: 260px; }
        }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <p id="loading-text" style="font-weight: 500; color: #2C3E50;">กำลังประมวลผล...</p>
    </div>

    <div id="lightbox">
        <img id="lightbox-img" src="">
        <div class="lightbox-controls">
            <a id="lightbox-download" href="#" target="_blank" class="btn-download">💾 บันทึกรูปภาพ</a>
            <button class="btn-close" onclick="closeLightbox()">❌ ปิด</button>
        </div>
    </div>

    <div id="login-section">
        <div class="login-box">
            <button class="settings-btn" onclick="openPwdModal()" title="ตั้งค่ารหัสผ่าน">⚙️</button>
            <img src="https://i.postimg.cc/jqMXsk40/C4925ED8-7DE0-4FA1-BC0D-9829AE4BA690.png" class="logo-img">
            <h2>MY VAULT</h2>
            <p>กรุณากรอกรหัสผ่านเพื่อเข้าสู่คลังรูปภาพ</p>
            <input type="password" id="pwdInput" placeholder="Password">
            <button class="action-btn" onclick="checkLogin()">UNLOCK</button>
            <p id="errorMsg" style="color: #E74C3C; font-size: 13px; display: none; margin-top: 15px; font-weight: 500;">รหัสผ่านไม่ถูกต้องค่ะพี่ขา 🥺</p>
            
            <div id="password-modal">
                <h3 style="margin-top: 0; font-weight: 500;">ตั้งค่ารหัสผ่านใหม่</h3>
                <input type="text" id="newPwdInput" placeholder="พิมพ์รหัสผ่านใหม่ที่นี่">
                <button class="action-btn" onclick="changePassword()" style="margin-bottom: 10px;">ยืนยันการเปลี่ยนรหัส</button>
                <button class="action-btn" onclick="resetPassword()" style="background: #E74C3C; margin-bottom: 10px;">รีเซ็ตเป็นรหัสเริ่มต้น</button>
                <button class="action-btn" onclick="closePwdModal()" style="background: #95A5A6;">ย้อนกลับ</button>
            </div>
        </div>
    </div>

    <div id="gallery-section">
        <header>
            <img src="https://i.postimg.cc/jqMXsk40/C4925ED8-7DE0-4FA1-BC0D-9829AE4BA690.png" class="logo-img" style="width: 65px; height: 65px;">
            <h1>GALLERY</h1>
            
            <div class="header-actions">
                <button class="sync-btn" onclick="loadRealPhotos()">🔄 อัปเดตรูปภาพ</button>
                <button class="logout-btn" onclick="logout()">🚪 ออกจากระบบ</button>
            </div>
            
            <div class="tabs">
                <button class="tab-btn active">ทั้งหมด</button>
                <button class="tab-btn">Study picture</button>
                <button class="tab-btn">Personal photo</button>
            </div>
        </header>
        <div class="gallery-grid" id="photoGrid"></div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyIiTfCaz_PZp3IQSBoOiWs5y4Q9WNhE1bNvP4WtK4RtfuDTdnV38EADkh1BUdfi8uH/exec';
        let allPhotos = []; 

        function showLoading(text) {
            document.getElementById('loading-text').innerText = text;
            document.getElementById('loading-overlay').style.display = 'flex';
        }
        function hideLoading() {
            document.getElementById('loading-overlay').style.display = 'none';
        }

        function checkLogin() {
            const pwd = document.getElementById('pwdInput').value;
            showLoading('กำลังเข้าสู่ระบบ รอแป๊บนึงน้าพี่ขาา~ 🚀');
            
            fetch(`${SCRIPT_URL}?action=checkPassword&password=${encodeURIComponent(pwd)}`)
                .then(res => res.json())
                .then(data => {
                    if(data.status === 'success') {
                        document.getElementById('login-section').style.display = 'none';
                        document.getElementById('gallery-section').style.display = 'block';
                        loadRealPhotos();
                    } else {
                        hideLoading();
                        document.getElementById('errorMsg').style.display = 'block';
                    }
                }).catch(() => { hideLoading(); alert('ระบบขัดข้องค่า'); });
        }

        function logout() {
            if(confirm("พี่ขาจะออกจากระบบจริงๆ หรอคะ? 🥺")) {
                document.getElementById('pwdInput').value = ''; 
                document.getElementById('errorMsg').style.display = 'none'; 
                document.getElementById('gallery-section').style.display = 'none'; 
                document.getElementById('login-section').style.display = 'flex'; 
                allPhotos = []; 
                document.getElementById('photoGrid').innerHTML = ''; 
            }
        }

        document.getElementById("pwdInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") { event.preventDefault(); checkLogin(); }
        });

        function openPwdModal() { document.getElementById('password-modal').style.display = 'flex'; }
        function closePwdModal() { document.getElementById('password-modal').style.display = 'none'; }
        
        function changePassword() {
            const newPwd = document.getElementById('newPwdInput').value;
            if(!newPwd) return alert('ใส่รหัสก่อนสิคะพี่ขา!');
            showLoading('กำลังอัปเดตรหัสผ่าน...');
            fetch(`${SCRIPT_URL}?action=changePassword&newPass=${encodeURIComponent(newPwd)}`)
                .then(res => res.json())
                .then(data => {
                    hideLoading();
                    alert(data.message);
                    closePwdModal();
                });
        }

        function resetPassword() {
            if(!confirm('ยืนยันรีเซ็ตเป็นรหัส Pongpak2006 ใช่ไหมคะ?')) return;
            showLoading('กำลังรีเซ็ตระบบ...');
            fetch(`${SCRIPT_URL}?action=resetPassword`)
                .then(res => res.json())
                .then(data => {
                    hideLoading();
                    alert(data.message);
                    closePwdModal();
                });
        }

        function loadRealPhotos() {
            showLoading('กำลังดึงรูปล่าสุดจาก Drive ค่าา 📸');
            fetch(`${SCRIPT_URL}?action=getPhotos`)
                .then(res => res.json())
                .then(data => {
                    hideLoading();
                    if(data.status === 'success') {
                        allPhotos = data.data; 
                        renderGallery(document.querySelector('.tab-btn.active').innerText); 
                    }
                }).catch(() => { hideLoading(); alert('ดึงรูปล้มเหลวค่า'); });
        }

        function renderGallery(filterCategory) {
            const grid = document.getElementById('photoGrid');
            grid.innerHTML = ''; 
            
            let filtered = filterCategory !== 'ทั้งหมด' ? allPhotos.filter(p => p.category === filterCategory) : allPhotos;

            if(filtered.length === 0) {
                grid.innerHTML = '<p style="text-align:center; width:100%; color:#7F8C8D; grid-column: 1 / -1; margin-top: 50px; font-weight: 500;">ยังไม่มีรูปเลยค่าา ลองส่งเข้าบอตดูน้า 🌬️</p>';
                return;
            }

            filtered.forEach(photo => {
                const card = document.createElement('div');
                card.className = 'img-card';
                let subTag = photo.subCategory ? `<div class="sub-tag">📚 ${photo.subCategory}</div>` : '';
                let highResUrl = photo.url.replace('w1000', 'w2000'); 

                card.innerHTML = `
                    <img src="${photo.url}" loading="lazy" onclick="openLightbox('${highResUrl}')">
                    ${subTag}
                    <div class="tag">${photo.category}</div>
                    <button class="delete-btn" onclick="deletePhoto('${photo.id}', this)" title="ลบรูป">🗑️</button>
                `;
                grid.appendChild(card);
            });
        }

        function deletePhoto(fileId, btnElement) {
            if(confirm("พี่ขาจะโยนรูปนี้ทิ้งจริงๆ หรอคะ? 🥺")) {
                showLoading('กำลังโยนลงถังขยะให้ค่าา 🗑️💨');
                
                fetch(`${SCRIPT_URL}?action=deletePhoto&fileId=${fileId}`)
                    .then(res => res.json())
                    .then(data => {
                        hideLoading();
                        if(data.status === 'success') {
                            const cardElement = btnElement.closest('.img-card');
                            cardElement.style.opacity = '0';
                            setTimeout(() => { cardElement.remove(); }, 300);
                            allPhotos = allPhotos.filter(p => p.id !== fileId);
                        }
                    }).catch(() => { hideLoading(); alert('ลบไม่สำเร็จค่า ลองใหม่น้า'); });
            }
        }

        function openLightbox(imgUrl) {
            document.getElementById('lightbox-img').src = imgUrl;
            document.getElementById('lightbox-download').href = imgUrl;
            document.getElementById('lightbox').style.display = 'flex';
        }
        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
        }

        const tabBtns = document.querySelectorAll('.tab-btn');
        tabBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                tabBtns.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                renderGallery(this.innerText);
            });
        });
    </script>
</body>
</html>
