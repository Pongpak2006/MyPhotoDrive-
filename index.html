<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyPhotoDrive</title>
    
    <link rel="icon" type="image/png" href="https://i.postimg.cc/jqMXsk40/C4925ED8-7DE0-4FA1-BC0D-9829AE4BA690.png">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/jqMXsk40/C4925ED8-7DE0-4FA1-BC0D-9829AE4BA690.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="MyPhotoDrive">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #F8F9FA;
            --text-main: #2C3E50;
            --text-muted: #95A5A6;
            --card-bg: #FFFFFF;
        }
        
        body { margin: 0; font-family: 'Kanit', sans-serif; background-color: var(--bg-color); color: var(--text-main); display: flex; flex-direction: column; align-items: center; min-height: 100vh; -webkit-tap-highlight-color: transparent; }
        .logo-img { width: 75px; height: 75px; object-fit: cover; border-radius: 20px; margin-bottom: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); }
        
        #login-section { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; width: 100%; }
        .login-box { background: var(--card-bg); padding: 45px 35px; border-radius: 28px; box-shadow: 0 15px 35px rgba(0,0,0,0.04); text-align: center; width: 85%; max-width: 340px; }
        .login-box h2 { margin: 0 0 5px; font-weight: 500; letter-spacing: 2px; font-size: 22px; }
        .login-box p { color: var(--text-muted); font-size: 14px; margin-bottom: 35px; }
        input[type="password"] { width: 100%; padding: 16px; border: 1.5px solid #EAEAEA; border-radius: 14px; font-family: 'Kanit'; font-size: 16px; margin-bottom: 20px; box-sizing: border-box; outline: none; transition: all 0.3s ease; text-align: center; letter-spacing: 3px; }
        input[type="password"]:focus { border-color: var(--text-main); }
        button.action-btn { background: var(--text-main); color: #FFF; border: none; padding: 16px; width: 100%; border-radius: 14px; font-family: 'Kanit'; font-size: 15px; cursor: pointer; transition: all 0.3s ease; letter-spacing: 1.5px; font-weight: 500; }
        button.action-btn:hover { background: #1A252F; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(44, 62, 80, 0.2); }
        .error-msg { color: #E74C3C; font-size: 13px; margin-top: 15px; display: none; }

        #gallery-section { display: none; width: 100%; max-width: 1100px; padding: 60px 30px; box-sizing: border-box; }
        header { display: flex; flex-direction: column; align-items: center; margin-bottom: 45px; }
        h1 { margin: 0 0 25px; font-weight: 400; font-size: 24px; letter-spacing: 3px; }
        .tabs { display: flex; gap: 15px; background: #FFF; padding: 8px; border-radius: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); overflow-x: auto; max-width: 100%; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab-btn { background: transparent; color: var(--text-muted); padding: 10px 24px; border-radius: 20px; font-size: 14px; border: none; cursor: pointer; transition: all 0.3s ease; font-family: 'Kanit'; white-space: nowrap; }
        .tab-btn.active { background: var(--text-main); color: #FFF; font-weight: 500; }

        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .img-card { background: #EEE; height: 280px; border-radius: 20px; overflow: hidden; position: relative; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .img-card img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s ease; }
        .img-card:hover img { transform: scale(1.05); }
        
        .tag { position: absolute; bottom: 15px; left: 15px; background: rgba(255, 255, 255, 0.95); padding: 6px 14px; border-radius: 12px; font-size: 12px; font-weight: 500; letter-spacing: 0.5px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); color: var(--text-main); }
        
        /* ป้ายชื่อวิชา (ถ้ามี) */
        .sub-tag { position: absolute; top: 15px; left: 15px; background: rgba(44, 62, 80, 0.9); padding: 6px 14px; border-radius: 12px; font-size: 12px; font-weight: 400; letter-spacing: 0.5px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); color: #FFF; backdrop-filter: blur(5px); }

        /* ปุ่มลบรูปภาพ */
        .delete-btn { position: absolute; bottom: 15px; right: 15px; background: rgba(255, 255, 255, 0.9); border: none; width: 36px; height: 36px; border-radius: 50%; font-size: 16px; cursor: pointer; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: all 0.3s ease; }
        .delete-btn:hover { background: #E74C3C; color: #FFF; transform: scale(1.1); }

        @media screen and (max-width: 768px) {
            .login-box { width: 90%; padding: 35px 25px; border-radius: 20px; }
            .login-box h2 { font-size: 20px; }
            input[type="password"], button.action-btn { padding: 14px; font-size: 14px; border-radius: 12px; }
            #gallery-section { padding: 30px 15px; }
            h1 { font-size: 20px; margin-bottom: 20px; }
            .tabs { gap: 10px; padding: 6px; }
            .tab-btn { padding: 8px 18px; font-size: 13px; }
            .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(100%, 1fr)); gap: 20px; }
            .img-card { height: 240px; border-radius: 16px; }
        }
    </style>
</head>
<body>

    <div id="login-section">
        <div class="login-box">
            <img src="https://i.postimg.cc/jqMXsk40/C4925ED8-7DE0-4FA1-BC0D-9829AE4BA690.png" alt="Logo" class="logo-img">
            <h2>MY VAULT</h2>
            <p>กรุณากรอกรหัสผ่านเพื่อเข้าสู่คลังรูปภาพ</p>
            <input type="password" id="pwdInput" placeholder="Password">
            <button class="action-btn" onclick="checkLogin()">UNLOCK</button>
            <div id="errorMsg" class="error-msg">รหัสผ่านไม่ถูกต้องค่ะพี่ขา ลองใหม่อีกทีน้า~ 🥺</div>
        </div>
    </div>

    <div id="gallery-section">
        <header>
            <img src="https://i.postimg.cc/jqMXsk40/C4925ED8-7DE0-4FA1-BC0D-9829AE4BA690.png" alt="Logo" class="logo-img" style="width: 60px; height: 60px;">
            <h1>GALLERY</h1>
            <div class="tabs">
                <button class="tab-btn active">ทั้งหมด</button>
                <button class="tab-btn">Study picture</button>
                <button class="tab-btn">Personal photo</button>
            </div>
        </header>
        <div class="gallery-grid" id="photoGrid"></div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyIiTfCaz_PZp3IQSBoOiWs5y4Q9WNhE1bNvP4WtK4RtfuDTdnV38EADkh1BUdfi8uH/exec';
        let allPhotos = []; 

        function checkLogin() {
            const btn = document.querySelector('.action-btn');
            const pwd = document.getElementById('pwdInput').value;
            const errorMsg = document.getElementById('errorMsg');
            
            btn.innerText = 'UNLOCKING...';
            
            fetch(`${SCRIPT_URL}?action=checkPassword&password=${encodeURIComponent(pwd)}`)
                .then(response => response.json())
                .then(data => {
                    if(data.status === 'success') {
                        document.getElementById('login-section').style.display = 'none';
                        document.getElementById('gallery-section').style.display = 'block';
                        loadRealPhotos();
                    } else {
                        errorMsg.style.display = 'block';
                        btn.innerText = 'UNLOCK';
                    }
                })
                .catch(error => { alert('ไม่สามารถเชื่อมต่อระบบหลังบ้านได้ค่ะ'); btn.innerText = 'UNLOCK'; });
        }

        document.getElementById("pwdInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") { event.preventDefault(); checkLogin(); }
        });

        function loadRealPhotos() {
            const grid = document.getElementById('photoGrid');
            grid.innerHTML = '<p style="text-align:center; width:100%; color:#95A5A6; grid-column: 1 / -1; margin-top: 50px;">กำลังค้นหารูปใน Drive รอแป๊บนึงน้าพี่ขาา~ ⏳✨</p>';
            
            fetch(`${SCRIPT_URL}?action=getPhotos`)
                .then(response => response.json())
                .then(data => {
                    if(data.status === 'success') {
                        allPhotos = data.data; 
                        renderGallery(document.querySelector('.tab-btn.active').innerText); 
                    }
                })
                .catch(error => { grid.innerHTML = '<p style="text-align:center; width:100%; color:#E74C3C; grid-column: 1 / -1;">ดึงรูปภาพไม่สำเร็จค่ะพี่ขา ลองรีเฟรชหน้าเว็บน้า 🥺</p>'; });
        }

        function renderGallery(filterCategory) {
            const grid = document.getElementById('photoGrid');
            grid.innerHTML = ''; 
            
            let filtered = allPhotos;
            if(filterCategory !== 'ทั้งหมด') {
                filtered = allPhotos.filter(photo => photo.category === filterCategory);
            }

            if(filtered.length === 0) {
                grid.innerHTML = '<p style="text-align:center; width:100%; color:#95A5A6; grid-column: 1 / -1; margin-top: 50px;">ยังไม่มีรูปภาพเลยค่าา ลองส่งเข้า LINE บอตดูน้าา~ 🌬️</p>';
                return;
            }

            filtered.forEach(photo => {
                const card = document.createElement('div');
                card.className = 'img-card';
                
                // เช็กว่ามีชื่อวิชาไหม ถ้ามีให้โชว์ป้ายชื่อวิชามุมซ้ายบน
                let subTagHTML = '';
                if (photo.subCategory) {
                    subTagHTML = `<div class="sub-tag">📚 ${photo.subCategory}</div>`;
                }

                card.innerHTML = `
                    <img src="${photo.url}" alt="Photo" loading="lazy">
                    ${subTagHTML}
                    <div class="tag">${photo.category}</div>
                    <button class="delete-btn" onclick="deletePhoto('${photo.id}')" title="ลบรูปภาพ">🗑️</button>
                `;
                grid.appendChild(card);
            });
        }

        // ฟังก์ชันลบรูปภาพแบบตัวมัม
        function deletePhoto(fileId) {
            if(confirm("ว้ายยย พี่ขาจะลบรูปนี้ทิ้งจริงๆ หรอคะ? 🥺\n(ถ้ากดตกลง ระบบจะจับโยนลงถังขยะใน Drive เลยน้า)")) {
                const grid = document.getElementById('photoGrid');
                grid.innerHTML = '<p style="text-align:center; width:100%; color:#E74C3C; grid-column: 1 / -1; margin-top: 50px;">กำลังเอาไปทิ้งถังขยะให้ค่าา รอแป๊บนึงน้า~ 🗑️💨</p>';

                fetch(`${SCRIPT_URL}?action=deletePhoto&fileId=${fileId}`)
                    .then(response => response.json())
                    .then(data => {
                        if(data.status === 'success') {
                            loadRealPhotos(); // ลบเสร็จให้โหลดรูปใหม่มาโชว์ทันที
                        }
                    });
            }
        }

        const tabBtns = document.querySelectorAll('.tab-btn');
        tabBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                tabBtns.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                renderGallery(this.innerText);
            });
        });
    </script>
</body>
</html>
